<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ростелеком - Цифровой пропуск</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0054A6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .header-bar {
            background: white;
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo-small img {
            height: 40px;
        }
        .logout-btn {
            background: #0054A6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            width: auto;
            min-width: 80px;
        }
        .logout-btn:hover {
            background: #003d7a;
            transform: translateY(-1px);
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .welcome-text h2 {
            color: #0054A6;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .welcome-text p {
            color: #666;
            font-size: 14px;
        }
        .qr-container {
            display: flex;
            justify-content: center;
            margin: 25px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
        }
        #qrcode img {
            width: 200px;
            height: 200px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 10px;
        }
        .timer {
            text-align: center;
            font-size: 42px;
            font-weight: bold;
            color: #0054A6;
            margin: 20px 0;
            font-family: monospace;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0054A6;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #003d7a;
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            display: none;
        }
        .message.success {
            background: #d1fae5;
            color: #059669;
            display: block;
        }
        .info-text {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        @media (max-width: 480px) {
            .card { padding: 30px 25px; }
            .logo-small img { height: 32px; }
            .logout-btn { padding: 6px 16px; font-size: 13px; min-width: 70px; }
            .timer { font-size: 32px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header-bar">
        <div class="logo-small">
            <img src="/static/img/logo.png" alt="Ростелеком">
        </div>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
    
    <div class="card">
        <div class="welcome-text">
            <h2>Ваш цифровой пропуск</h2>
            <p>QR-код для прохода в здание</p>
        </div>
        
        <div class="qr-container">
            <div id="qrcode"></div>
        </div>
        
        <div class="timer" id="timer">--:--</div>
        
        <button id="generateBtn">Сгенерировать пропуск</button>
        <div id="scanMessage" class="message"></div>
        <div class="info-text">
            ⏱️ QR-код действителен 5 минут<br>
            🔒 После сканирования или истечения времени сессия завершится
        </div>
    </div>
</div>

<script>
    let accessToken = localStorage.getItem('access_token');
    
    if (!accessToken) {
        alert('Сессия истекла');
        window.location.href = '/';
    }
    
    let timerInterval = null;
    let currentToken = null;
    let timeLeft = 0;
    
    function logout() {
        localStorage.removeItem('access_token');
        window.location.href = '/';
    }
    
    document.getElementById('logoutBtn').onclick = logout;
    
    function generateQR() {
        if (timerInterval) clearInterval(timerInterval);
        
        fetch('/generate-qr', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken }
        })
        .then(function(response) {
            if (response.status === 401) {
                logout();
                throw new Error('Сессия истекла');
            }
            return response.json();
        })
        .then(function(data) {
            currentToken = data.qr_value;
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById('qrcode'), {
                text: currentToken,
                width: 200,
                height: 200
            });
            startTimer(300);
            document.getElementById('scanMessage').style.display = 'none';
        })
        .catch(function(error) {
            console.error('Error:', error);
            if (error.message !== 'Сессия истекла') {
                alert('Ошибка генерации QR-кода');
            }
        });
    }
    
    document.getElementById('generateBtn').onclick = generateQR;
    
    function startTimer(seconds) {
        timeLeft = seconds;
        updateTimerDisplay();
        timerInterval = setInterval(function() {
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert('Время действия QR-кода истекло');
                logout();
            } else {
                timeLeft--;
                updateTimerDisplay();
            }
        }, 1000);
    }
    
    function updateTimerDisplay() {
        var minutes = Math.floor(timeLeft / 60);
        var seconds = timeLeft % 60;
        document.getElementById('timer').innerText = 
            (minutes < 10 ? '0' + minutes : minutes) + ':' + 
            (seconds < 10 ? '0' + seconds : seconds);
    }
    
    function checkQRStatus() {
        if (!currentToken) return;
        fetch('/check-qr/' + currentToken)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.status === 'used') {
                    clearInterval(timerInterval);
                    var msgDiv = document.getElementById('scanMessage');
                    msgDiv.innerHTML = '✅ QR-код отсканирован! Доступ разрешен.';
                    msgDiv.className = 'message success';
                    msgDiv.style.display = 'block';
                    setTimeout(logout, 3000);
                }
            })
            .catch(function(err) { console.log('Ошибка:', err); });
    }
    
    setInterval(checkQRStatus, 5000);
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    
    generateQR();
</script>
</body>
</html>
