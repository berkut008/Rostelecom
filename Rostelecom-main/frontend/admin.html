<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ростелеком - Админ-панель</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0054A6;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header-bar {
            background: white;
            border-radius: 20px;
            padding: 12px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo-small img {
            height: 40px;
        }
        .logout-btn {
            background: #0054A6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            width: auto;
            min-width: 80px;
        }
        .logout-btn:hover {
            background: #003d7a;
            transform: translateY(-1px);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #0054A6;
        }
        .grid-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #0054A6;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #00A0E3;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00A0E3;
        }
        button {
            background: #0054A6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #003d7a;
        }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }
        .message.success {
            background: #d1fae5;
            color: #059669;
            display: block;
        }
        .message.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }
        .user-list {
            max-height: 350px;
            overflow-y: auto;
        }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .user-name {
            font-weight: 600;
            color: #1e293b;
        }
        .user-email {
            font-size: 12px;
            color: #64748b;
        }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-admin {
            background: #0054A6;
            color: white;
        }
        .badge-user {
            background: #e2e8f0;
            color: #475569;
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        .log-table th, .log-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .log-table th {
            background: #f8fafc;
            color: #0054A6;
            font-weight: 600;
        }
        .status-success { color: #10b981; font-weight: 600; }
        .status-error { color: #ef4444; }
        @media (max-width: 768px) {
            .grid-2cols { grid-template-columns: 1fr; }
            .header-bar { flex-direction: row; justify-content: space-between; }
            .logo-small img { height: 32px; }
            .logout-btn { padding: 6px 16px; font-size: 13px; min-width: 70px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-bar">
        <div class="logo-small">
            <img src="/static/img/logo.png" alt="Ростелеком">
        </div>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><h3>👥 Всего сотрудников</h3><div class="stat-number" id="total-users">0</div></div>
        <div class="stat-card"><h3>📱 QR-генераций (сегодня)</h3><div class="stat-number" id="today-qr">0</div></div>
        <div class="stat-card"><h3>✅ Успешных проходов</h3><div class="stat-number" id="success-scans">0</div></div>
    </div>
    
    <div class="grid-2cols">
        <div class="card">
            <h2>➕ Регистрация сотрудника</h2>
            <div class="form-group"><label>📧 Корпоративная почта (@rt.ru)</label><input type="email" id="reg-email" placeholder="ivanov@rt.ru"></div>
            <div class="form-group"><label>👤 Полное имя</label><input type="text" id="reg-name" placeholder="Иванов Иван Иванович"></div>
            <div class="form-group"><label>🔒 Пароль</label><input type="password" id="reg-password" placeholder="Минимум 6 символов"></div>
            <button id="registerBtn">Зарегистрировать сотрудника</button>
            <div id="register-message" class="message"></div>
        </div>
        <div class="card">
            <h2>👥 Сотрудники</h2>
            <div class="user-list" id="user-list"><div style="text-align:center; padding:20px;">Загрузка...</div></div>
        </div>
    </div>
    
    <div class="card">
        <h2>📋 Лог событий</h2>
        <div style="max-height: 400px; overflow-y: auto;">
            <table class="log-table"><thead><tr><th>Время</th><th>Событие</th><th>Пользователь</th><th>Статус</th> </tr></thead>
            <tbody id="log-body"><tr><td colspan="4">Загрузка...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    var accessToken = localStorage.getItem('access_token');
    
    if (!accessToken) {
        alert('Сессия истекла');
        window.location.href = '/';
    }
    
    function logout() {
        localStorage.removeItem('access_token');
        window.location.href = '/';
    }
    
    document.getElementById('logoutBtn').onclick = logout;
    
    function showMessage(el, text, type) {
        el.innerHTML = text;
        el.className = 'message ' + type;
        setTimeout(function() {
            el.style.display = 'none';
        }, 3000);
    }
    
    async function registerUser() {
        var email = document.getElementById('reg-email').value;
        var name = document.getElementById('reg-name').value;
        var password = document.getElementById('reg-password').value;
        var msgDiv = document.getElementById('register-message');
        
        if (!email || !name || !password) {
            showMessage(msgDiv, 'Заполните все поля', 'error');
            return;
        }
        if (!email.endsWith('@rt.ru')) {
            showMessage(msgDiv, 'Только корпоративная почта @rt.ru', 'error');
            return;
        }
        if (password.length < 6) {
            showMessage(msgDiv, 'Пароль минимум 6 символов', 'error');
            return;
        }
        
        try {
            var res = await fetch('/admin/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
                body: JSON.stringify({ login: email, full_name: name, password: password })
            });
            var data = await res.json();
            if (res.ok) {
                showMessage(msgDiv, '✅ ' + data.message, 'success');
                document.getElementById('reg-email').value = '';
                document.getElementById('reg-name').value = '';
                document.getElementById('reg-password').value = '';
                loadUsers();
                loadLogs();
                loadStats();
            } else {
                showMessage(msgDiv, '❌ ' + data.detail, 'error');
            }
        } catch (error) {
            showMessage(msgDiv, 'Ошибка соединения', 'error');
        }
    }
    
    document.getElementById('registerBtn').onclick = registerUser;
    
    async function loadUsers() {
        try {
            var res = await fetch('/admin/users', { headers: { 'Authorization': 'Bearer ' + accessToken } });
            var users = await res.json();
            var userList = document.getElementById('user-list');
            if (!users.length) {
                userList.innerHTML = '<div style="text-align:center; padding:20px;">Нет сотрудников</div>';
                return;
            }
            var html = '';
            for (var i = 0; i < users.length; i++) {
                var u = users[i];
                html += '<div class="user-item"><div><div class="user-name">' + u.full_name + '</div><div class="user-email">' + u.login + '</div></div><span class="badge ' + (u.is_admin ? 'badge-admin' : 'badge-user') + '">' + (u.is_admin ? '👑 Админ' : '👤 Сотрудник') + '</span></div>';
            }
            userList.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    
    async function loadLogs() {
        try {
            var res = await fetch('/admin/logs', { headers: { 'Authorization': 'Bearer ' + accessToken } });
            var logs = await res.json();
            var tbody = document.getElementById('log-body');
            if (!logs.length) {
                tbody.innerHTML = '<tr><td colspan="4">Нет событий</td></tr>';
                return;
            }
            var html = '';
            for (var i = 0; i < logs.length; i++) {
                var l = logs[i];
                var date = new Date(l.timestamp).toLocaleString('ru-RU');
                html += '<tr><td>' + date + '</td><td>' + l.event + '</td><td>' + (l.user || '-') + '</td><td class="' + (l.status === 'success' ? 'status-success' : 'status-error') + '">' + (l.status === 'success' ? '✅ Успешно' : '❌ Ошибка') + '</td></tr>';
            }
            tbody.innerHTML = html;
        } catch(e) { console.error(e); }
    }
    
    async function loadStats() {
        try {
            var res = await fetch('/admin/stats', { headers: { 'Authorization': 'Bearer ' + accessToken } });
            var s = await res.json();
            document.getElementById('total-users').textContent = s.total_users || 0;
            document.getElementById('today-qr').textContent = s.today_qr || 0;
            document.getElementById('success-scans').textContent = s.success_scans || 0;
        } catch(e) { console.error(e); }
    }
    
    loadUsers();
    loadLogs();
    loadStats();
    setInterval(function() { loadLogs(); loadStats(); }, 5000);
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
</script>
</body>
</html>
