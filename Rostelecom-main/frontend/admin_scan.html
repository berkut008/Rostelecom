<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ростелеком - Демо-сканер</title>
    <link rel="icon" type="image/png" href="/static/img/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0054A6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .header-bar {
            background: white;
            border-radius: 20px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .logo-small img {
            height: 40px;
        }
        .logout-btn {
            background: #0054A6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            width: auto;
            min-width: 80px;
        }
        .logout-btn:hover {
            background: #003d7a;
            transform: translateY(-1px);
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .welcome-text h2 {
            color: #0054A6;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .welcome-text p {
            color: #666;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            background: #f8fafc;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00A0E3;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0054A6;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #003d7a;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 16px;
            display: none;
            text-align: left;
        }
        .result.success {
            background: #d1fae5;
            color: #059669;
            border-left: 4px solid #059669;
            display: block;
        }
        .result.error {
            background: #fee2e2;
            color: #dc2626;
            border-left: 4px solid #dc2626;
            display: block;
        }
        .info-text {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        @media (max-width: 480px) {
            .card { padding: 30px 25px; }
            .logo-small img { height: 32px; }
            .logout-btn { padding: 6px 16px; font-size: 13px; min-width: 70px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-bar">
        <div class="logo-small">
            <img src="/static/img/logo.png" alt="Ростелеком">
        </div>
        <button class="logout-btn" id="logoutBtn">Выйти</button>
    </div>
    
    <div class="card">
        <div class="welcome-text">
            <h2>Демо-сканер турникета</h2>
            <p>Вставьте содержимое QR-кода для имитации сканирования</p>
        </div>
        
        <div class="input-group">
            <label>Токен из QR-кода</label>
            <input type="text" id="token" placeholder="Вставьте токен...">
        </div>
        <button id="scanBtn">Сканировать</button>
        <div id="result" class="result"></div>
        
        <div class="info-text">
            💡 Для работы необходимо быть авторизованным как администратор
        </div>
    </div>
</div>

<script>
    var accessToken = localStorage.getItem('access_token');
    
    if (!accessToken) {
        alert('Сессия истекла');
        window.location.href = '/';
    }
    
    function logout() {
        localStorage.removeItem('access_token');
        window.location.href = '/';
    }
    
    document.getElementById('logoutBtn').onclick = logout;
    
    async function scan() {
        var qrToken = document.getElementById('token').value;
        var resultDiv = document.getElementById('result');
        
        if (!qrToken) {
            resultDiv.className = 'result error';
            resultDiv.innerHTML = '❌ Введите токен из QR-кода';
            return;
        }
        
        try {
            var response = await fetch('/admin/scan/' + qrToken, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken }
            });
            var data = await response.json();
            if (response.ok) {
                resultDiv.className = 'result success';
                resultDiv.innerHTML = '✅ ' + data.message + '<br><br>👤 Сотрудник: ' + data.user.full_name + '<br>📧 ' + data.user.login;
            } else {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ ' + data.detail;
            }
        } catch (error) {
            resultDiv.className = 'result error';
            resultDiv.innerHTML = '❌ Ошибка соединения с сервером';
        }
    }
    
    document.getElementById('scanBtn').onclick = scan;
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
</script>
</body>
</html>
