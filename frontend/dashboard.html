<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Точка Входа - Ваш пропуск</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logo {
            font-weight: bold;
            color: #0054A6;
            font-size: 20px;
        }
        .logout {
            background: none;
            border: none;
            color: #0054A6;
            cursor: pointer;
            font-size: 14px;
        }
        .qr-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .qr-placeholder {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        #qrcode img {
            width: 200px;
            height: 200px;
            border: 2px solid #eee;
            padding: 10px;
            border-radius: 10px;
        }
        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #0054A6;
            margin: 15px 0;
        }
        button {
            background: #0054A6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:active {
            background: #003d7a;
        }
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
        @media print {
            body {
                display: none;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Ростелеком</div>
            <button class="logout" onclick="logout()">Выйти</button>
        </div>
        <div class="qr-card">
            <h3>Ваш цифровой пропуск</h3>
            <div class="qr-placeholder">
                <div id="qrcode"></div>
            </div>
            <div class="timer" id="timer">--:--</div>
            <button onclick="generateQR()">Сгенерировать пропуск</button>
            <div class="info-text">
                QR-код действителен 5 минут. После сканирования или истечения времени сессия завершится.
            </div>
        </div>
    </div>

    <script>
        let timerInterval = null;
        let currentToken = null;
        let timeLeft = 0;
        
        // Проверка авторизации
        const token = localStorage.getItem('access_token');
        if (!token) {
            window.location.href = '/';
        }
        
        function generateQR() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            fetch('/generate-qr', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => {
                if (response.status === 401) {
                    logout();
                    throw new Error('Сессия истекла');
                }
                return response.json();
            })
            .then(data => {
                currentToken = data.qr_value;
                // Очищаем старый QR
                document.getElementById('qrcode').innerHTML = '';
                // Создаем новый
                new QRCode(document.getElementById('qrcode'), {
                    text: currentToken,
                    width: 200,
                    height: 200
                });
                startTimer(300); // 5 минут = 300 секунд
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Ошибка генерации QR-кода');
            });
        }
        
        function startTimer(seconds) {
            timeLeft = seconds;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    alert('Время действия QR-кода истекло. Сессия будет закрыта.');
                    logout();
                } else {
                    timeLeft--;
                    updateTimerDisplay();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/';
        }
        
        // Запрет правой кнопки мыши
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // Опционально: периодически проверяем, не был ли QR уже отсканирован
        function checkQRStatus() {
            if (!currentToken) return;
            fetch(`/check-qr/${currentToken}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'used') {
                        clearInterval(timerInterval);
                        alert('QR-код был успешно отсканирован! Проход разрешен.');
                        logout();
                    } else if (data.status === 'invalid') {
                        clearInterval(timerInterval);
                        alert('QR-код недействителен.');
                        logout();
                    }
                })
                .catch(err => console.log('Ошибка проверки статуса:', err));
        }
        
        // Проверяем статус каждые 10 секунд
        setInterval(checkQRStatus, 10000);
    </script>
</body>
</html>
