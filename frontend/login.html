<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Точка Входа - Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Запрет выделения текста */
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0054A6 0%, #00A0E3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #0054A6;
            margin-bottom: 10px;
        }
        .sub-logo {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0054A6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #003d7a;
        }
        .error {
            color: red;
            margin: 10px 0;
            font-size: 14px;
        }
        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
        /* Запрет скриншотов (условно) */
        @media print {
            body {
                display: none;
            }
        }
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Ростелеком</div>
        <div class="sub-logo">Технологии возможностей</div>
        <h2>Вход в систему</h2>
        <div id="error-message" class="error"></div>
        <input type="text" id="login" placeholder="Логин" autocomplete="off">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div class="info">* Для регистрации обратитесь к администратору</div>
    </div>

    <script>
        async function login() {
            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            if (!login || !password) {
                errorDiv.innerText = 'Заполните все поля';
                return;
            }
            
            const formData = new URLSearchParams();
            formData.append('username', login);
            formData.append('password', password);
            
            try {
                const response = await fetch('/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.innerText = data.detail || 'Ошибка авторизации';
                }
            } catch (error) {
                errorDiv.innerText = 'Ошибка соединения с сервером';
            }
        }
        
        // Запрет правой кнопки мыши
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
    </script>
</body>
</html>
